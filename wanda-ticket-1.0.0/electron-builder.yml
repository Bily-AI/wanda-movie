appId: com.wanda.ticket.tool
productName: 万达快速出票
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# 真实城市/影院数据:打包到 resources/config/city.json,供 loadCityData 兜底读取
extraResources:
  - from: config/city.json
    to: config/city.json
asar: true
compression: maximum
electronLanguages:
  - zh-CN
  - en-US
win:
  target:
    - portable
  artifactName: ${productName}-${version}.${ext}
portable:
  # 单 exe 便携版:自解压运行;本地数据写到 exe 同目录的 data/(见 src/main/index.ts)
  artifactName: ${productName}-${version}.${ext}
  unpackDirName: WandaTicket
  requestExecutionLevel: user

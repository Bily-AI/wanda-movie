# 万达售票后端 Nginx 反向代理 —— 可选,但强烈建议(能上 HTTPS)。
# 放到 /etc/nginx/sites-available/wanda,再软链到 sites-enabled/,然后 nginx -t && systemctl reload nginx
#
# 【有域名 + HTTPS 版】把 api.example.com 换成你的域名,先用 certbot 签证书:
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d api.example.com
# certbot 会自动改这个 server 块加上 443/证书,你只需先写好下面的 80 块。

server {
    listen 80;
    server_name api.example.com;   # ← 换成你的域名

    # 反代到本机后端
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 客户端下载热更新包可能较大,放开体积限制
    client_max_body_size 200m;
}

# ── 没有域名、只用 IP 的话不用 Nginx,直接让客户端连 http://你的IP:3000 即可。
#    但那样是明文 HTTP,登录密码/JWT 会走明网。建议尽快弄个域名上 HTTPS。
